<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miniature World Gallery</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Miniature World Gallery</h1>
    </header>
    
    <div id="map-container" style="width: 100%; height: 500px; background-color: #e0f7fa;"></div>
    
    <main>
        <div id="flag-container" class="flag-grid"></div>

        <div class="view-more-container" style="text-align: center; margin-top: 30px; margin-bottom: 30px;">
            <button id="view-more-btn" class="view-more-btn" style="background-color: #e53935; color: #fff; border: none; padding: 12px 40px; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold;">VIEW MORE</button>
        </div>
    </main>

    <div id="popup-overlay" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <span id="popup-close" class="popup-close">×</span>
            <h2 id="popup-dish-name">作品名</h2>
            <div class="slider-container">
                <button id="slider-prev" class="slider-btn">◀</button>
                <img id="popup-main-image" src="" alt="作品画像">
                <button id="slider-next" class="slider-btn">▶</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
