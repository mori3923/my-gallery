<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miniature World Gallery</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Miniature World Gallery</h1>
    </header>
    
    <div id="map-container"></div>
    
    <main>
        <div id="flag-container" class="flag-grid"></div>

        <div class="view-more-container" style="text-align: center; margin-top: 30px; margin-bottom: 30px;">
            <button id="view-more-btn" class="view-more-btn">VIEW MORE</button>
        </div>
    </main>

    <div id="popup-overlay" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <div class="popup-header">
                <div class="popup-header-left">
                    <img id="popup-flag" src="" alt="Flag" class="popup-flag">
                    <div class="popup-titles">
                        <h2 id="popup-country-name">Country</h2>
                        <p id="popup-dish-name">Dish</p>
                    </div>
                </div>
                <span id="popup-close" class="popup-close">×</span>
            </div>
            
            <div class="slider-container">
                <button id="slider-prev" class="slider-btn">◀</button>
                <div class="image-wrapper">
                    <img id="popup-main-image" src="" alt="作品画像">
                </div>
                <button id="slider-next" class="slider-btn">▶</button>
            </div>
        </div>
    </div>

    <div id="list-overlay" class="popup-overlay" style="display: none;">
        <div class="popup-content" style="max-height: 80vh; overflow-y: auto; width: 300px;">
            <span id="list-close" class="popup-close">×</span>
            <h2 style="margin-top: 0; border-bottom: 2px solid #e53935; padding-bottom: 10px;">すべての作品</h2>
            <div id="all-works-list" style="display: flex; flex-direction: column; text-align: left; margin-top: 10px;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
